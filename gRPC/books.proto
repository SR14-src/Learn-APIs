syntax = "proto3";

package books;

// ========================
// Define the service
// These are the available RPC functions (like endpoints in REST)
// ========================
service BookService {
  rpc GetBook       (GetBookRequest)    returns (Book);
  rpc GetAllBooks   (Empty)             returns (BookList);
  rpc AddBook       (AddBookRequest)    returns (Book);
  rpc UpdateBook    (UpdateBookRequest) returns (Book);
  rpc DeleteBook    (DeleteBookRequest) returns (DeleteResponse);
}

// ========================
// Define message shapes
// These are like the request/response body types
// ========================

message Empty {}

message Book {
  int32  id     = 1;
  string title  = 2;
  string author = 3;
  int32  year   = 4;
}

message BookList {
  repeated Book books = 1;
}

message GetBookRequest {
  int32 id = 1;
}

message AddBookRequest {
  string title  = 1;
  string author = 2;
  int32  year   = 3;
}

message UpdateBookRequest {
  int32  id     = 1;
  string title  = 2;
  string author = 3;
  int32  year   = 4;
}

message DeleteBookRequest {
  int32 id = 1;
}

message DeleteResponse {
  string message = 1;
}